<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henley Karanja | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <nav>
        <div class="logo">Henley.dev</div>
        <div class="links">
            <a href="#hero">Home</a>
            <a href="#projects">Projects</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="hero" class="hero-section">
        <h1 data-aos="fade-down">Henley Karanja</h1>
        <p data-aos="fade-up" data-aos-delay="200">System Developer | C++ | Python | JavaScript</p>
        <div class="hero-btns" data-aos="zoom-in" data-aos-delay="400">
            <a href="https://github.com/HenleyKaranja" class="btn">GitHub</a>
        </div>
    </section>

    <section id="projects">
        <h2 data-aos="slide-right">GitHub Projects</h2>
        <div id="github-cards" class="projects-grid">
            </div>
    </section>

    <section id="skills">
        <h2 data-aos="flip-up">Technical Skills</h2>
        <div class="skills-container">
            <div class="skill-card" data-aos="flip-left">C++</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="100">Python</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="200">Solidity</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="300">Networking</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="300">Django</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="300">Node.js</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="300">C</div>
            <div class="skill-card" data-aos="flip-left" data-aos-delay="300">JavaScript</div>
        </div>
    </section>

    <section id="contact">
        <div class="contact-card" data-aos="zoom-out-up">
            <h2>Get In Touch</h2>
            <form id="contact-form">
                <input type="text" id="user_name" placeholder="Name" required>
                <input type="email" id="user_email" placeholder="Email" required>
                <textarea id="message" placeholder="Your Message" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
            <p id="status-msg"></p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
